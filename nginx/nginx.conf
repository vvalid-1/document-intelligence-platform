user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redact SSE token from logs to avoid leaking short-lived tokens
    map $request_uri $loggable_uri {
        ~^(.+[?&])token=[^&]*(.*)$ "$1token=REDACTED$2";
        default $request_uri;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request_method $loggable_uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;

    include /etc/nginx/conf.d/*.conf;
}
