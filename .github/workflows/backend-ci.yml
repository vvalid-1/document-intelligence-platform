name: Backend CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: docplat
          POSTGRES_PASSWORD: docplat_secret
          POSTGRES_DB: docplat
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://docplat:docplat_secret@localhost:5432/docplat
      TEST_DATABASE_URL: postgresql+asyncpg://docplat:docplat_secret@localhost:5432/docplat_test
      JWT_SECRET_KEY: ci-test-only-key-not-used-in-production-32x
      UPLOAD_DIR: /tmp/docplat_test_uploads

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test database
        run: psql postgresql://docplat:docplat_secret@localhost:5432/docplat -c "CREATE DATABASE docplat_test;"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -v --tb=short
